name: SonarCloud Analysis

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: macos-14
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Run Tests with Coverage
        run: |
          xcodebuild test \
            -project Bookkeeping.xcodeproj \
            -scheme Bookkeeping \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult || true
          echo "---"
          ls -la TestResults.xcresult 2>&1 || echo "No xcresult bundle"
          find . -name "*.xcresult" 2>/dev/null

      - name: Generate Coverage Report
        run: |
          if [ -f TestResults.xcresult ]; then
            echo "xcresult bundle found"
            xcrun xccov view --report TestResults.xcresult --json > coverage.json 2>&1
            echo "coverage.json size: $(wc -c < coverage.json)"
            head -50 coverage.json
          else
            echo "No xcresult bundle found"
            echo '{"coverage":[]}' > coverage.json
          fi

      - name: Run SwiftLint
        run: |
          if command -v swiftlint &> /dev/null; then
            swiftlint lint --reporter json > swiftlint-report.json || true
          else
            echo '{"issues":[]}' > swiftlint-report.json
          fi

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
