name: SonarCloud Analysis

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: macos-14
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Run Tests with Coverage
        run: |
          xcodebuild test \
            -project Bookkeeping.xcodeproj \
            -scheme Bookkeeping \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.5' \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            2>&1 | xcpretty || true

      - name: Generate Coverage Report
        run: |
          if [ -f TestResults.xcresult ]; then
            xcrun xccov view --report TestResults.xcresult --json > coverage.json
            xcrun xccov view --report TestResults.xcresult --lcov > coverage.lcov
            echo "Coverage files generated"
            cat coverage.json | head -20
          else
            echo "No xcresult bundle found"
            echo '{"coverage":[]}' > coverage.json
            echo "" > coverage.lcov
          fi

      - name: Run SwiftLint
        run: |
          if command -v swiftlint &> /dev/null; then
            swiftlint lint --reporter json > swiftlint-report.json || true
          else
            echo '{"issues":[]}' > swiftlint-report.json
          fi

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
