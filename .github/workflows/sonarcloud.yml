name: SonarCloud Analysis

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: macos-14
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Run Tests with Coverage
        run: |
          xcodebuild test \
            -project Bookkeeping.xcodeproj \
            -scheme Bookkeeping \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult || true
          echo "---"
          ls -la TestResults.xcresult 2>&1 || echo "No xcresult bundle"
          find . -name "*.xcresult" 2>/dev/null

      - name: Install Coverage Tools
        run: |
          brew install xcresultparser || true

      - name: Generate Coverage Report
        run: |
          xcresult=$(find . -name "*.xcresult" -maxdepth 1 | head -1)
          if [ -n "$xcresult" ]; then
            echo "Found xcresult: $xcresult"
            # Try xcresultparser
            xcresultparser -o sonarqube -p Swift "$xcresult" > coverage.xml 2>&1 || true
            # Fallback: xccov + custom converter
            if [ ! -s coverage.xml ] || grep -q "error" coverage.xml; then
              xcrun xccov view --report "$xcresult" --json > coverage.json 2>&1 || true
              python3 scripts/convert_coverage.py coverage.json coverage.xml || true
            fi
            echo "coverage.xml size: $(wc -c < coverage.xml 2>/dev/null || echo 0)"
            head -20 coverage.xml 2>/dev/null || true
          else
            echo "No xcresult bundle found"
            echo '<?xml version="1.0"?><coverage version="1"/>' > coverage.xml
          fi

      - name: Run SwiftLint
        run: |
          if command -v swiftlint &> /dev/null; then
            swiftlint lint --reporter json > swiftlint-report.json || true
          else
            echo '{"issues":[]}' > swiftlint-report.json
          fi

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
