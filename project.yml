name: Bookkeeping
options:
  bundleIdPrefix: com.bookkeeping
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  defaultConfig: Release
  knownRegions:
    - zh-Hans
    - zh-Hant
    - en
    - fr

settings:
  base:
    SWIFT_VERSION: "5.9"
    INFOPLIST_FILE: Bookkeeping/Resources/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.bookkeeping.app
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  Bookkeeping:
    type: application
    platform: iOS
    sources:
      - Bookkeeping
    resources:
      - Bookkeeping/Resources
    settings:
      base:
        INFOPLIST_FILE: Bookkeeping/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.bookkeeping.app
    entitlements:
      path: Bookkeeping/Bookkeeping.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.bookkeeping.app
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.security.application-groups:
          - group.com.bookkeeping.app
  
  BookkeepingWidget:
    type: app-extension
    platform: iOS
    sources:
      - BookkeepingWidget
    settings:
      base:
        INFOPLIST_FILE: BookkeepingWidget/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.bookkeeping.app.widget
        SWIFT_VERSION: "5.9"
        CODE_SIGN_ENTITLEMENTS: BookkeepingWidget/BookkeepingWidget.entitlements
    dependencies:
      - target: Bookkeeping
        embed: false
    entitlements:
      path: BookkeepingWidget/BookkeepingWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.bookkeeping.app
  
  BookkeepingTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - BookkeepingTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bookkeeping.app.tests
        SWIFT_VERSION: "5.9"
    dependencies:
      - target: Bookkeeping
  
  BookkeepingUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - BookkeepingUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bookkeeping.app.uitests
        SWIFT_VERSION: "5.9"
    dependencies:
      - target: Bookkeeping
